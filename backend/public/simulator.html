<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KOLLECTION AI Simulator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;overflow:hidden}
#root{display:flex;height:100vh}
.sidebar{width:320px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sidebar h2{padding:16px;font-size:14px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #334155}
.sidebar-section{padding:12px 16px;border-bottom:1px solid #334155}
.sidebar-section label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
.sidebar-section input,.sidebar-section select{width:100%;padding:6px 8px;background:#0f172a;border:1px solid #334155;border-radius:4px;color:#e2e8f0;font-size:13px}
.scenario-list{flex:1;overflow-y:auto}
.scenario-btn{display:block;width:100%;text-align:left;padding:10px 16px;background:none;border:none;border-bottom:1px solid #1e293b;color:#cbd5e1;font-size:13px;cursor:pointer;transition:background .15s}
.scenario-btn:hover{background:#334155}
.scenario-btn.active{background:#2563eb;color:#fff}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{padding:12px 20px;background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:600}
.header-actions{display:flex;gap:8px}
.header-actions button{padding:6px 14px;border-radius:6px;border:none;font-size:12px;cursor:pointer;font-weight:500}
.btn-reset{background:#334155;color:#e2e8f0}
.btn-export{background:#2563eb;color:#fff}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:75%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;position:relative;word-wrap:break-word}
.msg-user{align-self:flex-end;background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.msg-ai{align-self:flex-start;background:#334155;color:#e2e8f0;border-bottom-left-radius:4px}
.msg-ai .intent-badge{display:inline-block;font-size:10px;background:#475569;padding:2px 6px;border-radius:3px;margin-top:6px;color:#94a3b8}
.msg-ai .correction-btn{position:absolute;top:4px;right:4px;background:none;border:none;cursor:pointer;font-size:14px;opacity:0;transition:opacity .15s}
.msg-ai:hover .correction-btn{opacity:1}
.msg-system{align-self:center;background:#1e293b;color:#94a3b8;font-size:12px;font-style:italic;max-width:90%}
.corrected{border:2px solid #f59e0b}
.input-bar{padding:12px 20px;background:#1e293b;border-top:1px solid #334155;display:flex;gap:8px}
.input-bar input{flex:1;padding:10px 14px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none}
.input-bar input:focus{border-color:#2563eb}
.input-bar button{padding:10px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500}
.input-bar button:disabled{opacity:.5;cursor:not-allowed}
.loading{display:inline-block;width:8px;height:8px;border-radius:50%;background:#94a3b8;animation:blink 1.4s infinite both}
.loading:nth-child(2){animation-delay:.2s}.loading:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:24px;width:480px;max-width:90vw}
.modal h3{margin-bottom:12px;font-size:16px}
.modal textarea{width:100%;height:100px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:8px;font-size:13px;resize:vertical}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.modal-actions button{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px}
.stats{padding:8px 16px;background:#0f172a;border-bottom:1px solid #334155;display:flex;gap:16px;font-size:11px;color:#64748b}
.stats span{color:#94a3b8}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const SCENARIOS = [
  { id: 1, label: "Premier contact (curieux)", msg: "Oui c'est moi, c'est quoi?" },
  { id: 2, label: "Veut payer mais pas tout", msg: "Je peux pas payer 1000$ d'un coup" },
  { id: 3, label: "Pas d'argent du tout", msg: "J'ai pas d'argent, je suis au chomage" },
  { id: 4, label: "Promet vendredi", msg: "Je peux payer vendredi quand je recois ma paye" },
  { id: 5, label: "Agressif / insultes", msg: "Calisse lache moi avec ca" },
  { id: 6, label: "Nie la dette (1er)", msg: "C'est pas moi, j'ai jamais pris de pret" },
  { id: 7, label: "Nie la dette (maintient)", msg: "Je vous dis que c'est pas moi, j'ai rien signe" },
  { id: 8, label: "Demande son solde", msg: "C'est combien mon solde exactement?" },
  { id: 9, label: "Menace avocat", msg: "Je vais appeler mon avocat" },
  { id: 10, label: "Mentionne l'OPC", msg: "Je vais appeler l'OPC vous avez pas le droit" },
  { id: 11, label: "Frustre (sans OPC)", msg: "STOP arretez de m'ecrire c'est du harcelement" },
  { id: 12, label: "Accepte le rabais", msg: "Ok je vais prendre le rabais, envoyez le lien" },
  { id: 13, label: "Negocie plus bas (cash)", msg: "Je peux faire 400$ cash la maintenant" },
  { id: 14, label: "Qui etes-vous?", msg: "C'est qui ca? C'est quoi ce numero?" },
  { id: 15, label: "Promesse future", msg: "Je peux pas la mais le mois prochain oui" },
  { id: 16, label: "Paiement partiel fait", msg: "J'ai deja paye 200$ la semaine passee" },
];

function App() {
  const [config, setConfig] = useState({
    name: "Jean Tremblay", creditor: "CreditFina", amount: 1000,
    language: "fr", agentName: "Sophie", tier: 1, phone: "+15141234567"
  });
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [corrections, setCorrections] = useState([]);
  const [editingIdx, setEditingIdx] = useState(null);
  const [editNote, setEditNote] = useState("");
  const [activeScenario, setActiveScenario] = useState(null);
  const chatRef = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, loading]);

  const buildHistory = useCallback((msgs) => {
    return msgs.filter(m => m.role !== 'system').map(m => ({
      role: m.role === 'user' ? 'debtor' : 'agent',
      content: m.content
    }));
  }, []);

  const sendMessage = useCallback(async (text) => {
    if (!text.trim() || loading) return;
    const userMsg = { role: 'user', content: text.trim() };
    const newMsgs = [...messages, userMsg];
    setMessages(newMsgs);
    setInput("");
    setLoading(true);

    try {
      const res = await fetch('/agents/negotiation/suggest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          debtorId: "test-simulator",
          debtorPhone: config.phone,
          amount: Number(config.amount),
          companyName: config.creditor,
          agentName: config.agentName,
          tier: Number(config.tier),
          floor: Number(config.amount) * 0.3,
          conversationHistory: buildHistory(newMsgs),
        })
      });
      const data = await res.json();
      const aiText = data.message || data.error || "Erreur: pas de reponse";
      const intent = data.intent || "UNKNOWN";
      setMessages(prev => [...prev, { role: 'ai', content: aiText, intent, raw: data }]);
    } catch (err) {
      setMessages(prev => [...prev, { role: 'ai', content: `Erreur: ${err.message}`, intent: 'ERROR' }]);
    }
    setLoading(false);
  }, [messages, loading, config, buildHistory]);

  const handleScenario = (sc) => {
    setActiveScenario(sc.id);
    setInput(sc.msg);
  };

  const resetChat = () => {
    setMessages([{ role: 'system', content: `Simulateur demarrer. Debiteur: ${config.name}, Creancier: ${config.creditor}, Montant: ${config.amount}$, Tier: ${config.tier}` }]);
    setActiveScenario(null);
  };

  const startCorrection = (idx) => {
    setEditingIdx(idx);
    setEditNote("");
  };

  const saveCorrection = () => {
    if (editingIdx === null) return;
    const msg = messages[editingIdx];
    const correction = {
      timestamp: new Date().toISOString(),
      messageIndex: editingIdx,
      aiMessage: msg.content,
      intent: msg.intent,
      correction: editNote,
      config: { ...config },
      conversationContext: messages.slice(Math.max(0, editingIdx - 2), editingIdx + 1).map(m => ({ role: m.role, content: m.content }))
    };
    setCorrections(prev => [...prev, correction]);
    setMessages(prev => prev.map((m, i) => i === editingIdx ? { ...m, corrected: true } : m));
    setEditingIdx(null);
  };

  const exportCorrections = () => {
    const blob = new Blob([JSON.stringify({ exportedAt: new Date().toISOString(), config, totalMessages: messages.length, corrections }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `kollection-corrections-${Date.now()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  useEffect(() => { resetChat(); }, []);

  const updateConfig = (key, val) => setConfig(prev => ({ ...prev, [key]: val }));

  return (
    <>
      <div className="sidebar">
        <h2>Config Debiteur</h2>
        <div className="sidebar-section">
          <label>Nom</label>
          <input value={config.name} onChange={e => updateConfig('name', e.target.value)} />
        </div>
        <div className="sidebar-section">
          <label>Creancier</label>
          <input value={config.creditor} onChange={e => updateConfig('creditor', e.target.value)} />
        </div>
        <div className="sidebar-section">
          <label>Montant ($)</label>
          <input type="number" value={config.amount} onChange={e => updateConfig('amount', e.target.value)} />
        </div>
        <div className="sidebar-section">
          <label>Telephone</label>
          <input value={config.phone} onChange={e => updateConfig('phone', e.target.value)} />
        </div>
        <div className="sidebar-section">
          <label>Langue</label>
          <select value={config.language} onChange={e => updateConfig('language', e.target.value)}>
            <option value="fr">Francais</option>
            <option value="en">English</option>
          </select>
        </div>
        <div className="sidebar-section">
          <label>Agent</label>
          <input value={config.agentName} onChange={e => updateConfig('agentName', e.target.value)} />
        </div>
        <div className="sidebar-section">
          <label>Tier</label>
          <select value={config.tier} onChange={e => updateConfig('tier', e.target.value)}>
            <option value="1">1 - Friendly (0-14j)</option>
            <option value="2">2 - Direct (15-60j)</option>
            <option value="3">3 - Urgent (61-90j)</option>
            <option value="4">4 - Final (90j+)</option>
          </select>
        </div>
        <h2>16 Scenarios</h2>
        <div className="scenario-list">
          {SCENARIOS.map(sc => (
            <button key={sc.id} className={`scenario-btn ${activeScenario === sc.id ? 'active' : ''}`} onClick={() => handleScenario(sc)}>
              {sc.id}. {sc.label}
            </button>
          ))}
        </div>
      </div>

      <div className="main">
        <div className="header">
          <h1>KOLLECTION AI Simulator</h1>
          <div className="header-actions">
            <button className="btn-reset" onClick={resetChat}>Reset</button>
            <button className="btn-export" onClick={exportCorrections} disabled={corrections.length === 0}>
              Export ({corrections.length})
            </button>
          </div>
        </div>
        <div className="stats">
          Messages: <span>{messages.length}</span> | Corrections: <span>{corrections.length}</span> | Tier: <span>{config.tier}</span> | Montant: <span>{config.amount}$</span>
        </div>

        <div className="chat" ref={chatRef}>
          {messages.map((m, i) => (
            <div key={i} className={`msg msg-${m.role} ${m.corrected ? 'corrected' : ''}`}>
              {m.content}
              {m.role === 'ai' && m.intent && <div className="intent-badge">{m.intent}</div>}
              {m.role === 'ai' && (
                <button className="correction-btn" onClick={() => startCorrection(i)} title="Corriger">&#9998;</button>
              )}
            </div>
          ))}
          {loading && (
            <div className="msg msg-ai">
              <span className="loading"></span>&nbsp;<span className="loading"></span>&nbsp;<span className="loading"></span>
            </div>
          )}
        </div>

        <div className="input-bar">
          <input
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && sendMessage(input)}
            placeholder="Ecris comme un debiteur..."
            disabled={loading}
          />
          <button onClick={() => sendMessage(input)} disabled={loading || !input.trim()}>Envoyer</button>
        </div>
      </div>

      {editingIdx !== null && (
        <div className="modal-overlay" onClick={() => setEditingIdx(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Corriger la reponse AI</h3>
            <p style={{fontSize:12,color:'#94a3b8',marginBottom:8}}>Intent: {messages[editingIdx]?.intent}</p>
            <p style={{fontSize:13,color:'#cbd5e1',marginBottom:12,padding:8,background:'#0f172a',borderRadius:6}}>{messages[editingIdx]?.content}</p>
            <textarea
              value={editNote}
              onChange={e => setEditNote(e.target.value)}
              placeholder="Qu'est-ce qui est incorrect? Quelle devrait etre la bonne reponse?"
              autoFocus
            />
            <div className="modal-actions">
              <button style={{background:'#334155',color:'#e2e8f0'}} onClick={() => setEditingIdx(null)}>Annuler</button>
              <button style={{background:'#f59e0b',color:'#000'}} onClick={saveCorrection} disabled={!editNote.trim()}>Sauvegarder</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
